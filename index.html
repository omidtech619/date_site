<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <title>💜</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      background: linear-gradient(135deg, #4f46e5, #9333ea);
      overflow: hidden;
      color: white;
    }

    .box {
      text-align: center;
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      margin-top: 10px;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 16px;
    }

    #yes {
      background: #22c55e;
      color: white;
    }

    #no {
      background: #ef4444;
      color: white;
      position: relative;
    }

    .heart {
      position: absolute;
      color: pink;
      animation: floatUp 2s linear forwards;
    }

    @keyframes floatUp {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-200px); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="box">
  <div id="step1">
    <h2>اسمت چیه؟ 😏</h2>
    <input id="nameInput" placeholder="اسم رو بنویس" />
    <br>
    <button onclick="start()">ادامه</button>
  </div>

  <div id="step2" style="display:none;">
    <h2 id="question"></h2>
    <button id="yes" onclick="yesClick()">آره ❤️</button>
    <button id="no" onclick="noClick()">نه 😢</button>
    <h3 id="sadText"></h3>
  </div>
</div>

<script>
let noMessages = [
  "قلبم شکست 💔",
  "جدی نه؟ 🥺",
  "من برنامه‌ریزی کرده بودم 😔",
  "داری ناراحتم می‌کنی 😭",
  "باشه... ولی دلم گرفت 💙"
];

let noIndex = 0;

function start() {
  let name = document.getElementById("nameInput").value;
  if (!name) return;

  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "block";
  document.getElementById("question").innerText = name + "، باهم بریم بیرون؟ 💜";
}

function noClick() {
  let noBtn = document.getElementById("no");
  let yesBtn = document.getElementById("yes");
  let text = document.getElementById("sadText");

  text.innerText = noMessages[noIndex % noMessages.length];
  noIndex++;

  // فرار کردن دکمه
  noBtn.style.position = "absolute";
  noBtn.style.top = Math.random() * 80 + "%";
  noBtn.style.left = Math.random() * 80 + "%";

  // کوچیک شدن
  noBtn.style.transform = "scale(0.9)";

  // بزرگ شدن yes
  yesBtn.style.transform = `scale(${1 + noIndex * 0.1})`;
}

function yesClick() {
  document.body.innerHTML = "<h1>یییییییی 💜❤️‍🔥</h1>";

  setInterval(() => {
    let heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.className = "heart";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = "80%";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 2000);
  }, 200);
}
</script>

</body>
</html>
